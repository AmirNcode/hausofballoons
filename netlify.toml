# Netlify configuration for the static Haus of Balloons site.
# The build step generates gallery-images.js from assets/pictures/ before the
# repository root is published as-is. Publishing the root is what lets Netlify's
# form detection scan index.html on each deploy.
[build]
  publish = "."
  command = "node scripts/generate-gallery-images.js"

# Serverless functions. `submission-created` fires on every Netlify Forms
# submission; it emails launch-party RSVP guests a confirmation via Resend.
# Requires the RESEND_API_KEY env var (Site config → Environment variables).
[functions]
  directory = "netlify/functions"

# Pretty-print the thank-you success page reliably at /thank-you (the form's
# action target) regardless of the "Pretty URLs" asset setting.
[[redirects]]
  from = "/thank-you"
  to = "/thank-you/"
  status = 301
  force = false

# Publishing the repo root would otherwise expose the function source at
# /netlify/functions/*. Hide it (this is the static path, not the invocation
# path /.netlify/functions/*, so it does not affect function execution).
[[redirects]]
  from = "/netlify/*"
  to = "/404"
  status = 404
  force = true
