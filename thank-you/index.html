<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta
      name="description"
      content="Thank you — your balloon decor quote request has been received by Haus of Balloons."
    >
    <title>Thank you &middot; Haus of Balloons</title>
    <meta name="theme-color" content="#8d0b0b">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400;1,9..144,600&amp;family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="preload" href="/assets/logo_text.webp" as="image" type="image/webp">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="thanks">
      <div class="deco" aria-hidden="true">
        <span class="blob" style="width:340px;height:340px;background:var(--pink);top:-60px;left:-90px;"></span>
        <span class="blob" style="width:300px;height:300px;background:var(--marigold);bottom:-40px;right:-90px;opacity:.3;"></span>
        <svg class="balloon balloon--float" style="--c:var(--coral);--bw:48px;top:11%;left:10%;--delay:.2s;" viewBox="0 0 60 92"><ellipse cx="30" cy="31" rx="25" ry="29" fill="var(--c)"/><path d="M30 60l-4.5 7h9z" fill="var(--c)"/><path d="M30 67c0 6 6 6 6 12s-6 6-6 11" fill="none" stroke="var(--c)" stroke-width="1.5" stroke-linecap="round"/><ellipse cx="20" cy="21" rx="5.5" ry="8.5" fill="#fff" opacity=".4" transform="rotate(-20 20 21)"/></svg>
        <svg class="balloon balloon--float" style="--c:var(--mint);--bw:36px;top:15%;right:12%;--delay:.7s;" viewBox="0 0 60 92"><ellipse cx="30" cy="31" rx="25" ry="29" fill="var(--c)"/><path d="M30 60l-4.5 7h9z" fill="var(--c)"/><path d="M30 67c0 6 6 6 6 12s-6 6-6 11" fill="none" stroke="var(--c)" stroke-width="1.5" stroke-linecap="round"/><ellipse cx="20" cy="21" rx="5.5" ry="8.5" fill="#fff" opacity=".4" transform="rotate(-20 20 21)"/></svg>
      </div>
      <div class="thanks__inner">
        <a href="/" aria-label="Haus of Balloons home">
          <img
            class="thanks__logo"
            src="/assets/logo_text.webp"
            alt="Haus of Balloons"
            width="1500"
            height="1500"
            decoding="async"
          >
        </a>
        <h1 class="thanks__title">Thank you &mdash; your request is in.</h1>
        <p class="thanks__text">
          We&rsquo;ll be in touch within 48 hours with a custom quote for your event.
          In the meantime, see our latest work on Instagram.
        </p>
        <div class="thanks__actions">
          <a
            class="btn btn--primary"
            href="https://instagram.com/hausofballoons.ca"
            target="_blank"
            rel="noopener"
          >Follow @hausofballoons.ca</a>
          <a class="btn btn--ghost" href="/">Back to home</a>
        </div>
      </div>
    </main>
  </body>
</html>
