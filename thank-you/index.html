<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <meta
      name="description"
      content="Thank you — your balloon decor quote request has been received by Haus of Balloons."
    >
    <title>Thank you &middot; Haus of Balloons</title>
    <link rel="preload" href="/assets/logo_text.svg" as="image">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="thanks">
      <div class="thanks__inner">
        <a href="/" aria-label="Haus of Balloons home">
          <img
            class="thanks__logo"
            src="/assets/logo_text.svg"
            alt="Haus of Balloons"
            width="1500"
            height="1500"
          >
        </a>
        <h1 class="thanks__title">Thank you &mdash; your request is in.</h1>
        <p class="thanks__text">
          We&rsquo;ll be in touch within 48 hours with a custom quote for your event.
          In the meantime, see our latest work on Instagram.
        </p>
        <div class="thanks__actions">
          <a
            class="btn btn--primary"
            href="https://instagram.com/hausofballoons.ca"
            target="_blank"
            rel="noopener"
          >Follow @hausofballoons.ca</a>
          <a class="btn btn--ghost" href="/">Back to home</a>
        </div>
      </div>
    </main>
  </body>
</html>
